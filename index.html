<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusTraveller - Landing Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <a href="#">BusTraveller</a>
            </div>

            <ul class="nav-links">
                <li><a href="#" class="active">HOME</a></li>
                <li><a href="#">ABOUT</a></li>
                <li><a href="#">TOUR</a></li>
                <li><a href="#">PACKAGE</a></li>
                <li><a href="#">CONTACT</a></li>
            </ul>

            <div class="nav-actions">
                <a href="#" class="btn-book">BOOK TRIP</a>
            </div>
        </nav>
    </header>

    <main class="hero-container">
        <section class="hero-card">
            <div class="hero-content">
                <p class="hero-subtitle">BUS YOUR TRAVEL JOURNEY</p>
                <h1 class="hero-title">Where Every Bus Ride Feels Magical!</h1>
                
                <div class="hero-buttons">
                    <a href="#" class="btn-primary">Book A Trip Now</a>
                    <a href="#" class="btn-play">
                        <i class="fa-solid :play"></i>
                    </a>
                </div>
            </div>

            <div class="hero-image-wrapper">
                <img src="ruta-de-tu-imagen-del-bus.png" alt="Bus Blanco" class="bus-image">
            </div>
        </section>
    </main>

</body>
</html>
